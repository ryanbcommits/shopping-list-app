<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopping List</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            margin: 5px;
        }
        #logOut {
            float: right;  /* Puts logout in corner */
        }
    </style>
</head>
<body>
    <h1 id="greeting"></h1>

    <form id="userForm">
        <div style="margin-bottom: 10px;">Get started:</div>
        <div>Step 1: Add an item to the text field.</div>
        <div style="margin-bottom: 10px;">Step 2: Select the corresponding category for that item and click "Add to List."</div>
        <div style="margin-bottom: 10px;">
            <label for="itemName">Enter a Shopping List Item Here: </label>
            <input type="text" id="itemName" placeholder="Milk, Eggs, Cheese..." autofocus>
        </div>
    </form>
    <form>
        <label for="categories">Category:</label>
        <select name="categories" id="categories">
            <!--At some point add a prompt so there's no default to Dairy-->
            <option value="" disabled selected>-- Select a category --</option>
            <option value="Dairy">Dairy</option>
            <option value="Produce">Produce</option>
            <option value="Grocery">Grocery</option>
            <option value="Meat">Meat</option>
            <option value="Frozen Food">Frozen Food</option>
            <option value="Fish / Seafood">Fish / Seafood</option>
        </select>
        <button id="connect">Add to List</button>
    </form>

    

    <button id="logOut">Log out</button>
    
    <br>
    <br>
    <!--SEARCH FILTER-->
    <div id="searchContainer">
        <label for="searchInput">Find items:</label> 
        <input type="search" id="searchInput" placeholder="Enter an item name">
            <!-- a button may not be necessary if the job is to do a live search-->
            <!-- <button id="searchItem" type="button">Search</button> -->
    </div>
   

    <h1>Your Current Shopping List:</h1>

    <div id="sort"></div>

    <ul id="myList">
        <!--List items will be added here dynamically-->
    </ul>
        
    <script type="module" src="index.js"></script>
    <footer>
    <p>&copy; 2025 Created by Ryan Burns</p>
</footer>
</body>
</html>
