<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shopping List</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            margin: 5px;
        }
        #logOut {
            float: right;  /* Puts logout in corner */
        }
    </style>
</head>
<body>
    <h1 id="greeting"></h1>

    <form id="userForm">
        <div style="margin-bottom: 10px;">Add items to your shopping list!</div>
        <div>Step 1: First add an item to your shopping List</div>
        
        <div style="margin-bottom: 10px;">
            <label for="itemName">Enter Item Here: </label>
            <input type="text" id="itemName" placeholder="Milk, Eggs, Cheese..." autofocus>
        </div>
    </form>
    <form>
        <label for="categories">Choose a category</label>
        <select name="categories" id="categories">
            <!--At some point add a prompt so there's no default to Dairy-->
            <option value="" disabled selected>-- Select a category --</option>
            <option value="Dairy">Dairy</option>
            <option value="Produce">Produce</option>
            <option value="Grocery">Grocery</option>
            <option value="Meat">Meat</option>
            <option value="Frozen Food">Frozen Food</option>
            <option value="Fish / Seafood">Fish / Seafood</option>
        </select>
    </form>

    <button id="connect">Add to List</button>

    <button id="logOut">Log out</button>
    
    <br>
    <br>
    <div>Find item: 
        <input type="search" placeholder="Enter an item name">
        <button>Search</button>
    </div>

    <h1>Your Current Shopping List:</h1>

    <div id="sort"></div>

    <ul id="myList">
        <!--List items will be added here dynamically-->
    </ul>
        
    <script type="module" src="index.js"></script>
    <footer>
    <p>&copy; 2025 Created by Ryan Burns</p>
</footer>
</body>
</html>
